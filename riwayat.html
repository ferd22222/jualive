<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <title>Riwayat — JuaLive</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .history-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 12px;
      cursor: pointer; transition: all 0.2s ease;
    }
    .history-card:hover { border-color: var(--primary); }
    .history-meta { font-size: 0.72rem; color: var(--text-tertiary); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .history-product { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .history-preview { font-size: 0.8rem; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .history-detail { display: none; }
    .history-detail.show { display: block; }
    .history-script-box {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; white-space: pre-wrap;
      font-size: 0.85rem; line-height: 1.7; color: var(--text-secondary);
      max-height: 50vh; overflow-y: auto; margin: 12px 0;
    }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-tertiary); }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="app.html" class="navbar-logo">
        <span class="logo-icon">📚</span> Riwayat
      </a>
      <button onclick="History.clearAll()" style="background:none;border:none;color:var(--text-tertiary);font-size:0.8rem;cursor:pointer;">🗑️ Hapus Semua</button>
    </div>
  </nav>

  <main class="app-page">
    <div class="container">
      <div class="app-header">
        <h1>Riwayat Script 📚</h1>
        <p style="margin-top: 4px;">Semua script yang pernah kamu buat</p>
      </div>

      <!-- List -->
      <div id="history-list"></div>

      <!-- Detail -->
      <div id="history-detail" class="history-detail">
        <div class="card" style="position: relative;">
          <button onclick="History.closeDetail()" style="position:absolute;right:12px;top:12px;background:none;border:none;color:var(--text-secondary);font-size:1.3rem;cursor:pointer;">✕</button>
          <h3 id="hd-title" style="margin-bottom: 4px;"></h3>
          <p id="hd-meta" style="font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 12px;"></p>
          <div id="hd-script" class="history-script-box"></div>
          <div class="flex gap-md">
            <button class="btn btn-primary btn-full" onclick="History.copyScript()">📋 Copy</button>
            <button class="btn btn-secondary" onclick="History.shareScript()" style="flex-shrink:0;">📤</button>
            <button class="btn btn-secondary" onclick="History.usePractice()" style="flex-shrink:0;">🎯</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-items">
      <a href="app.html" class="bottom-nav-item">
        <span class="nav-icon">🏠</span>Home
      </a>
      <a href="script.html" class="bottom-nav-item">
        <span class="nav-icon">📝</span>Script
      </a>
      <a href="templates.html" class="bottom-nav-item">
        <span class="nav-icon">📋</span>Template
      </a>
      <a href="practice.html" class="bottom-nav-item">
        <span class="nav-icon">🎯</span>Latihan
      </a>
      <a href="timer.html" class="bottom-nav-item">
        <span class="nav-icon">⏱️</span>Timer
      </a>
    </div>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/app.js"></script>
  <script>
    const History = {
      currentScript: '',

      init() { this.render(); },

      render() {
        const scripts = JuaLiveStorage.getScripts();
        const list = document.getElementById('history-list');

        if (scripts.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📝</div>
              <p>Belum ada riwayat script</p>
              <p style="font-size:0.8rem;margin-top:8px;">Generate script pertamamu di <a href="script.html" style="color:var(--primary);">Script Generator</a> atau ambil dari <a href="templates.html" style="color:var(--primary);">Template</a></p>
            </div>`;
          return;
        }

        list.innerHTML = scripts.map((s, i) => {
          const date = new Date(s.timestamp || Date.now()).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
          const preview = (s.script || '').substring(0, 100) + '...';
          return `
            <div class="history-card" onclick="History.showDetail(${i})">
              <div class="history-meta">
                <span>${s.platform || 'TikTok'}</span>
                <span>${date}</span>
              </div>
              <div class="history-product">${s.product || 'Script'}</div>
              <div class="history-preview">${preview}</div>
            </div>`;
        }).join('');
      },

      showDetail(index) {
        const scripts = JuaLiveStorage.getScripts();
        const s = scripts[index];
        if (!s) return;

        this.currentScript = s.script;
        document.getElementById('hd-title').textContent = s.product || 'Script';
        document.getElementById('hd-meta').textContent = `${s.platform || 'TikTok'} • ${new Date(s.timestamp || Date.now()).toLocaleDateString('id-ID')}`;
        document.getElementById('hd-script').textContent = s.script;
        document.getElementById('history-detail').classList.add('show');
        document.getElementById('history-list').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      },

      closeDetail() {
        document.getElementById('history-detail').classList.remove('show');
        document.getElementById('history-list').style.display = 'block';
      },

      copyScript() { App.copyText(this.currentScript); },
      shareScript() { App.shareWhatsApp(this.currentScript); },
      usePractice() {
        localStorage.setItem('practice_script', this.currentScript);
        window.location.href = 'practice.html';
      },
      clearAll() {
        if (confirm('Hapus semua riwayat script?')) {
          localStorage.removeItem('jualive_scripts');
          this.render();
          App.showToast('Riwayat dihapus! 🗑️');
        }
      }
    };
    document.addEventListener('DOMContentLoaded', () => History.init());
  </script>
</body>
</html>
