<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <title>Script Generator — JuaLive</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="app.html" class="navbar-logo">
        <span class="logo-icon">📝</span> Script Generator
      </a>
      <div class="navbar-links">
        <span class="badge badge-brand" id="usage-counter">0/3 hari ini</span>
      </div>
    </div>
  </nav>

  <main class="app-page">
    <div class="container">
      <form id="script-form" class="flex-col gap-md">
        <div class="form-group">
          <label class="form-label">Nama Produk *</label>
          <input type="text" id="product-name" class="form-input" placeholder="Contoh: Serum Glow White 30ml" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);">
          <div class="form-group">
            <label class="form-label">Kategori</label>
            <select id="product-category" class="form-select">
              <option value="Fashion">Fashion</option>
              <option value="Skincare & Beauty">Skincare & Beauty</option>
              <option value="Makanan & Minuman">Makanan & Minuman</option>
              <option value="Elektronik & Gadget">Elektronik & Gadget</option>
              <option value="Rumah Tangga">Rumah Tangga</option>
              <option value="Kesehatan">Kesehatan</option>
              <option value="Hobi & Mainan">Hobi & Mainan</option>
              <option value="Lainnya">Lainnya</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Harga (Rp) *</label>
            <input type="text" id="product-price" class="form-input" placeholder="99.000" required>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);">
          <div class="form-group">
            <label class="form-label">Platform</label>
            <select id="platform" class="form-select">
              <option value="TikTok Live">TikTok Live</option>
              <option value="Shopee Live">Shopee Live</option>
              <option value="Instagram Live">Instagram Live</option>
              <option value="Facebook Live">Facebook Live</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Tone/Gaya</label>
            <select id="tone" class="form-select">
              <option value="Energik & Fun">Energik & Fun</option>
              <option value="Santai & Friendly">Santai & Friendly</option>
              <option value="Profesional">Profesional</option>
              <option value="Mewah & Eksklusif">Mewah & Eksklusif</option>
              <option value="FOMO & Urgency">FOMO & Urgency</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Target Audience (opsional)</label>
          <input type="text" id="audience" class="form-input" placeholder="Contoh: Ibu muda 25-35 tahun">
        </div>

        <div class="form-group">
          <label class="form-label">Deskripsi Produk (opsional)</label>
          <textarea id="product-desc" class="form-textarea" placeholder="Jelaskan keunggulan produk, bahan, ukuran, dll..." rows="3"></textarea>
        </div>

        <button type="submit" id="generate-btn" class="btn btn-primary btn-lg btn-full">
          ✨ Generate Script
        </button>
      </form>

      <!-- Output -->
      <div style="margin-top: var(--space-xl);">
        <h3 style="margin-bottom: var(--space-md);">📜 Hasil Script</h3>
        <div id="script-output" class="output-box empty">
          Script live selling kamu akan muncul di sini...
        </div>
        <div id="output-actions" class="output-actions hidden">
          <button id="copy-btn" class="btn btn-secondary btn-sm">📋 Copy</button>
          <button id="share-btn" class="btn btn-secondary btn-sm">📱 Share WA</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-items">
      <a href="app.html" class="bottom-nav-item">
        <span class="nav-icon">🏠</span>Home
      </a>
      <a href="script.html" class="bottom-nav-item active">
        <span class="nav-icon">📝</span>Script
      </a>
      <a href="practice.html" class="bottom-nav-item">
        <span class="nav-icon">🎯</span>Practice
      </a>
      <a href="timer.html" class="bottom-nav-item">
        <span class="nav-icon">⏱️</span>Timer
      </a>
    </div>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/app.js"></script>
  <script src="js/script-gen.js"></script>
</body>
</html>
