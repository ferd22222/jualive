<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <title>Live Timer — JuaLive</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="app.html" class="navbar-logo">
        <span class="logo-icon">⏱️</span> Live Timer
      </a>
    </div>
  </nav>

  <main class="app-page">
    <div class="container">
      <!-- Timer Display -->
      <div style="text-align: center; margin-bottom: var(--space-xl); margin-top: var(--space-lg);">
        <div id="timer-display" class="timer-display">05:00</div>
        <p class="text-sm" style="margin-top: var(--space-sm); color: var(--text-tertiary);">Tips akan muncul otomatis setiap 30 detik</p>
      </div>

      <!-- Timer Settings -->
      <div class="card" style="margin-bottom: var(--space-lg);">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); margin-bottom: var(--space-md);">
          <div class="form-group">
            <label class="form-label">Durasi (menit)</label>
            <select id="timer-minutes" class="form-select">
              <option value="3">3 menit</option>
              <option value="5" selected>5 menit</option>
              <option value="10">10 menit</option>
              <option value="15">15 menit</option>
              <option value="20">20 menit</option>
              <option value="30">30 menit</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Produk (untuk tips AI)</label>
            <input type="text" id="timer-product" class="form-input" placeholder="Nama produk">
          </div>
        </div>
        <button id="gen-tips-btn" class="btn btn-secondary btn-full btn-sm">
          🤖 Generate Tips AI
        </button>
      </div>

      <!-- Controls -->
      <div class="flex gap-md" style="margin-bottom: var(--space-lg);">
        <button id="timer-start" class="btn btn-primary btn-lg btn-full">
          ▶️ Mulai Live
        </button>
        <button id="timer-stop" class="btn btn-lg btn-full hidden" style="background: var(--secondary); color: white; border: none;">
          ⏸️ Pause
        </button>
        <button id="timer-reset" class="btn btn-secondary btn-lg" style="flex-shrink: 0;">
          🔄
        </button>
      </div>

      <!-- Quick Tips -->
      <div class="card" style="background: var(--gradient-card); border-color: rgba(255,107,53,0.15);">
        <h4 style="margin-bottom: var(--space-md); font-size: 0.95rem;">⚡ Checklist Sebelum Live</h4>
        <div class="flex-col gap-sm" style="font-size: 0.9rem; color: var(--text-secondary);">
          <label style="display: flex; gap: 8px; cursor: pointer; align-items: center;">
            <input type="checkbox" style="accent-color: var(--primary); width: 18px; height: 18px;">
            Lighting cukup terang
          </label>
          <label style="display: flex; gap: 8px; cursor: pointer; align-items: center;">
            <input type="checkbox" style="accent-color: var(--primary); width: 18px; height: 18px;">
            Produk siap di depan kamera
          </label>
          <label style="display: flex; gap: 8px; cursor: pointer; align-items: center;">
            <input type="checkbox" style="accent-color: var(--primary); width: 18px; height: 18px;">
            Koneksi internet stabil
          </label>
          <label style="display: flex; gap: 8px; cursor: pointer; align-items: center;">
            <input type="checkbox" style="accent-color: var(--primary); width: 18px; height: 18px;">
            Script sudah disiapkan
          </label>
          <label style="display: flex; gap: 8px; cursor: pointer; align-items: center;">
            <input type="checkbox" style="accent-color: var(--primary); width: 18px; height: 18px;">
            Minum air putih 💧
          </label>
        </div>
      </div>
    </div>
  </main>

  <!-- Floating Tip Popup -->
  <div id="timer-tip" class="timer-tip-popup hidden">
    Tips will appear here
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-items">
      <a href="app.html" class="bottom-nav-item">
        <span class="nav-icon">🏠</span>Home
      </a>
      <a href="script.html" class="bottom-nav-item">
        <span class="nav-icon">📝</span>Script
      </a>
      <a href="practice.html" class="bottom-nav-item">
        <span class="nav-icon">🎯</span>Practice
      </a>
      <a href="timer.html" class="bottom-nav-item active">
        <span class="nav-icon">⏱️</span>Timer
      </a>
    </div>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/app.js"></script>
  <script src="js/timer.js"></script>
</body>
</html>
